<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Analytics · AI Blood Bank</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body class="bg-soft">
  <div class="container py-5">
    <div class="mx-auto" style="max-width: 1100px;">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h1 class="h3 mb-1">📊 Analytics Dashboard</h1>
          <div class="text-muted">Live stats from MySQL + trend charts.</div>
        </div>
        <a class="btn btn-outline-dark" href="/">← Back</a>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="card border-0 shadow-sm rounded-4"><div class="card-body">
          <div class="text-muted small">Hospitals</div><div class="h4 mb-0" id="kHosp">-</div>
        </div></div></div>
        <div class="col-md-3"><div class="card border-0 shadow-sm rounded-4"><div class="card-body">
          <div class="text-muted small">Receivers</div><div class="h4 mb-0" id="kRecv">-</div>
        </div></div></div>
        <div class="col-md-3"><div class="card border-0 shadow-sm rounded-4"><div class="card-body">
          <div class="text-muted small">Total Stock Rows</div><div class="h4 mb-0" id="kStock">-</div>
        </div></div></div>
        <div class="col-md-3"><div class="card border-0 shadow-sm rounded-4"><div class="card-body">
          <div class="text-muted small">Requests Today</div><div class="h4 mb-0" id="kToday">-</div>
        </div></div></div>
      </div>

      <div class="row g-3">
        <div class="col-lg-6">
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body">
              <div class="fw-semibold mb-2">Stock by Blood Group</div>
              <canvas id="chartStock"></canvas>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body">
              <div class="fw-semibold mb-2">Requests by Blood Group</div>
              <canvas id="chartReq"></canvas>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body">
              <div class="fw-semibold mb-2">Requests by Urgency</div>
              <canvas id="chartUrg"></canvas>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body">
              <div class="fw-semibold mb-2">Requests Trend (Last 14 Days)</div>
              <canvas id="chartTrend"></canvas>
            </div>
          </div>
        </div>
      </div>

      <hr class="my-4">

      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
            <div>
              <div class="fw-semibold">ML Demand Forecast</div>
              <div class="text-muted small">Forecast next N days using request history.</div>
            </div>
            <div class="d-flex gap-2">
              <select id="fBg" class="form-select form-select-sm">
                <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
              </select>
              <input id="fDays" type="number" min="1" max="60" value="14" class="form-control form-control-sm" style="width:100px;">
              <button id="btnForecast" class="btn btn-sm btn-primary">Forecast</button>
            </div>
          </div>
          <div class="mt-3">
            <canvas id="chartForecast"></canvas>
          </div>
          <div class="small text-muted mt-2" id="forecastMsg"></div>
        </div>
      </div>

    </div>
  </div>

<script>
async function loadAnalytics() {
  const res = await fetch("/api/analytics");
  const data = await res.json();

  document.getElementById("kHosp").textContent = data.totals.hospitals_count;
  document.getElementById("kRecv").textContent = data.totals.receivers_count;
  document.getElementById("kStock").textContent = data.totals.total_stock_rows;
  document.getElementById("kToday").textContent = data.totals.requests_today;

  // Stock chart
  new Chart(document.getElementById("chartStock"), {
    type: "bar",
    data: {
      labels: data.stock_by_bg.map(x => x.bg),
      datasets: [{ label: "Units (rows)", data: data.stock_by_bg.map(x => x.units) }]
    }
  });

  // Requests by BG
  new Chart(document.getElementById("chartReq"), {
    type: "bar",
    data: {
      labels: data.requests_by_bg.map(x => x.bg),
      datasets: [{ label: "Requests", data: data.requests_by_bg.map(x => x.requests) }]
    }
  });

  // Requests by urgency
  new Chart(document.getElementById("chartUrg"), {
    type: "doughnut",
    data: {
      labels: data.requests_by_urgency.map(x => x.urgency),
      datasets: [{ label: "Requests", data: data.requests_by_urgency.map(x => x.requests) }]
    }
  });

  // Trend
  new Chart(document.getElementById("chartTrend"), {
    type: "line",
    data: {
      labels: data.requests_trend_14d.map(x => x.day),
      datasets: [{ label: "Requests", data: data.requests_trend_14d.map(x => x.requests) }]
    }
  });
}

let forecastChart = null;

async function runForecast() {
  const bg = document.getElementById("fBg").value;
  const days = document.getElementById("fDays").value;
  const msg = document.getElementById("forecastMsg");
  msg.textContent = "Forecasting…";

  const res = await fetch(`/forecast?bg=${encodeURIComponent(bg)}&days=${encodeURIComponent(days)}`);
  const data = await res.json();

  if (data.message) {
    msg.textContent = data.message;
  } else {
    msg.textContent = `Forecast ready for ${data.bg}.`;
  }

  const labels = (data.forecast || []).map(x => x.day);
  const values = (data.forecast || []).map(x => x.predicted_requests);

  if (forecastChart) forecastChart.destroy();
  forecastChart = new Chart(document.getElementById("chartForecast"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{ label: "Predicted Requests/day", data: values }]
    }
  });
}

document.getElementById("btnForecast").addEventListener("click", runForecast);

loadAnalytics();
</script>
</body>
</html>
